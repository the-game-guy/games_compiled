
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Star Garden Idle</title>
  <style>
    :root { --bg:#0e1020; --panel:#171a33; --panel2:#202447; --text:#f5f7ff; --muted:#a7afd6; --accent:#7d7bff; --accent2:#38d7b8; --good:#53e07d; --bad:#ff6b6b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:system-ui,sans-serif; background:radial-gradient(circle at top, #1d2140, var(--bg)); color:var(--text); }
    .wrap { max-width:1100px; margin:0 auto; padding:20px; }
    .hero { display:flex; justify-content:space-between; gap:20px; align-items:start; margin-bottom:18px; }
    h1 { margin:0 0 8px; font-size:clamp(2rem, 4vw, 3.5rem); }
    p { color:var(--muted); line-height:1.5; }
    .topbar { display:flex; gap:10px; flex-wrap:wrap; }
    button { border:0; border-radius:999px; padding:12px 16px; background:var(--accent); color:white; font-weight:700; cursor:pointer; }
    .grid { display:grid; grid-template-columns:1.4fr .8fr; gap:18px; }
    .panel { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:18px; box-shadow:0 18px 40px rgba(0,0,0,.25); }
    .big { min-height:500px; }
    .statRow { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
    .stat { background:rgba(255,255,255,.05); border-radius:16px; padding:14px; text-align:center; }
    .stat span { display:block; color:var(--muted); font-size:.9rem; }
    .stat b { font-size:1.5rem; }
    .mine { width:100%; padding:18px; font-size:1.2rem; background:linear-gradient(135deg, var(--accent), var(--accent2)); margin:8px 0 10px; }
    .hint { margin-top:4px; }
    .sectionTitle { margin-top:18px; }
    .upgrades, .milestones { display:grid; gap:12px; }
    .card { background:rgba(255,255,255,.05); border-radius:14px; padding:14px; border:1px solid rgba(255,255,255,.06); }
    .card h3 { margin:0 0 6px; }
    .card p { margin:0 0 10px; }
    .card .row { display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .card button { background:var(--panel2); }
    .card button:disabled { opacity:.5; cursor:not-allowed; }
    .good { color:var(--good); }
    .bad { color:var(--bad); }
    @media (max-width:900px) { .hero, .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div>
        <h1>Star Garden Idle</h1>
        <p>Grow cosmic crystals, buy upgrades, and watch your little galaxy print resources while you chill.</p>
      </div>
      <div class="topbar">
        <button id="saveBtn">Save</button>
        <button id="resetBtn">Reset</button>
      </div>
    </section>

    <section class="grid">
      <div class="panel big">
        <div class="statRow">
          <div class="stat"><span>Crystals</span><b id="crystals">0</b></div>
          <div class="stat"><span>Per second</span><b id="cps">0</b></div>
          <div class="stat"><span>Total clicks</span><b id="clicks">0</b></div>
        </div>

        <button id="mineBtn" class="mine">Mine Crystal</button>
        <p class="hint">Click to gain crystals. Buy upgrades to automate the work.</p>

        <div class="sectionTitle"><h2>Upgrades</h2></div>
        <div id="upgrades" class="upgrades"></div>
      </div>

      <aside class="panel">
        <h2>Milestones</h2>
        <div id="milestones" class="milestones"></div>
      </aside>
    </section>
  </main>

  <script>
    const state = { crystals:0, clicks:0, clickPower:1, cps:0, autoMiners:0, crystalForges:0, nebulaBeacons:0, lastSave:Date.now() };

    const upgrades = [
      { id:'cursor', name:'Crystal Cursor', desc:'Each click gives +1 more crystal.', baseCost:10, cost(){ return Math.floor(this.baseCost * Math.pow(1.18, state.clickPower - 1)); }, canBuy(){ return state.crystals >= this.cost(); }, buy(){ state.crystals -= this.cost(); state.clickPower += 1; } },
      { id:'miner', name:'Auto Miner', desc:'Produces 1 crystal per second.', baseCost:25, cost(){ return Math.floor(this.baseCost * Math.pow(1.22, state.autoMiners)); }, canBuy(){ return state.crystals >= this.cost(); }, buy(){ state.crystals -= this.cost(); state.autoMiners += 1; } },
      { id:'forge', name:'Crystal Forge', desc:'Boosts auto production by +4 cps.', baseCost:120, cost(){ return Math.floor(this.baseCost * Math.pow(1.25, state.crystalForges)); }, canBuy(){ return state.crystals >= this.cost(); }, buy(){ state.crystals -= this.cost(); state.crystalForges += 1; } },
      { id:'beacon', name:'Nebula Beacon', desc:'Adds a huge +20 cps burst.', baseCost:600, cost(){ return Math.floor(this.baseCost * Math.pow(1.3, state.nebulaBeacons)); }, canBuy(){ return state.crystals >= this.cost(); }, buy(){ state.crystals -= this.cost(); state.nebulaBeacons += 1; } }
    ];

    const milestones = [
      { label:'Reach 100 crystals', check:() => state.crystals >= 100 },
      { label:'Own 3 auto miners', check:() => state.autoMiners >= 3 },
      { label:'Own 2 crystal forges', check:() => state.crystalForges >= 2 },
      { label:'Reach 1,000 crystals', check:() => state.crystals >= 1000 },
      { label:'Reach 10 cps', check:() => state.cps >= 10 }
    ];

    const upgradesEl = document.getElementById('upgrades');
    const milestonesEl = document.getElementById('milestones');

    function computeCps(){ state.cps = (state.autoMiners * 1) + (state.crystalForges * 4) + (state.nebulaBeacons * 20); }
    function format(n){ return Math.floor(n).toLocaleString(); }

    function render(){
      computeCps();
      document.getElementById('crystals').textContent = format(state.crystals);
      document.getElementById('cps').textContent = format(state.cps);
      document.getElementById('clicks').textContent = format(state.clicks);

      upgradesEl.innerHTML = '';
      for (const u of upgrades) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${u.name}</h3>
          <p>${u.desc}</p>
          <div class="row">
            <span>Cost: <b>${format(u.cost())}</b></span>
            <button type="button" ${u.canBuy() ? '' : 'disabled'}>Buy</button>
          </div>
        `;
        const btn = card.querySelector('button');
        btn.addEventListener('click', () => {
          if (!u.canBuy()) return;
          u.buy();
          render();
          save();
        });
        upgradesEl.appendChild(card);
      }

      milestonesEl.innerHTML = '';
      for (const m of milestones) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="row">
            <span>${m.label}</span>
            <b class="${m.check() ? 'good' : 'bad'}">${m.check() ? 'Done' : 'Not yet'}</b>
          </div>
        `;
        milestonesEl.appendChild(card);
      }
    }

    function mine(){ state.crystals += state.clickPower; state.clicks += 1; render(); }
    function save(){ localStorage.setItem('starGardenIdleSave', JSON.stringify(state)); }
    function load(){
      const raw = localStorage.getItem('starGardenIdleSave');
      if (!raw) return;
      try { Object.assign(state, JSON.parse(raw)); } catch (e) {}
    }
    function reset(){ localStorage.removeItem('starGardenIdleSave'); location.reload(); }

    load();
    render();
    setInterval(() => { computeCps(); state.crystals += state.cps / 10; render(); }, 100);
    setInterval(() => save(), 5000);

    document.getElementById('mineBtn').addEventListener('click', mine);
    document.getElementById('saveBtn').addEventListener('click', save);
    document.getElementById('resetBtn').addEventListener('click', reset);
  </script>
</body>
</html>
